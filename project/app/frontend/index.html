<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dify 聊天测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 85vh;
        }
        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e8e8e8;
            font-size: 18px;
            font-weight: 600;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .clear-btn {
            padding: 4px 12px;
            background: #f0f0f0;
            color: #666;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }
        .clear-btn:hover { background: #e0e0e0; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }
        .message.user { align-items: flex-end; }
        .message.assistant { align-items: flex-start; }
        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user .message-content {
            background: #007bff;
            color: white;
        }
        .message.assistant .message-content {
            background: #f0f0f0;
            color: #333;
        }
        .message-time {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid #e8e8e8;
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        .chat-input:focus { border-color: #007bff; }
        .send-btn {
            padding: 12px 24px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }
        .send-btn:hover { background: #0056b3; }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <span>Dify 聊天测试</span>
            <button class="clear-btn" onclick="clearConv()">清除会话</button>
        </div>
        <div class="chat-messages" id="messages"></div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="input" placeholder="输入消息，按回车发送" onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" id="sendBtn" onclick="send()">发送</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
